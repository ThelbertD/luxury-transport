/* ============ REVEAL ON SCROLL HOOK ============ */
const useReveal = () => {
  useEffect(() => {
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('in');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -60px 0px' });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
};

    let target = 0, current = 0, raf;
    let triggered = false;

    const tick = () => {
      current += (target - current) * 0.12;
      const v = videoRef.current;
      if (v) {
        v.style.transform = `translate3d(0, ${current.toFixed(2)}px, 0) scale(1.18)`;
      }
      raf = requestAnimationFrame(tick);
    };
    if (!reduced) raf = requestAnimationFrame(tick);

    const onScroll = () => {
      if (!triggered && window.scrollY > 20) {
        triggered = true;
        const v = videoRef.current;
        if (v) {
          const p = v.play();
          if (p && typeof p.catch === 'function') p.catch(() => {});
        }
      }
      if (!reduced) target = window.scrollY * 0.40;
    };

    return () => {
      cancelAnimationFrame(raf);

/* ============ HELP-DESK CONCIERGE CHATBOT ============ */
/* Type: rule-based booking concierge with quick replies and keyword routing. */
const ConciergeChatbot = () => {
  const [open, setOpen] = useState(false);
  const [messages, setMessages] = useState([
    { from: 'bot', text: "Welcome to Luxury Transport. I'm Adelaide, your booking concierge. How may I assist you today?" },
  ]);
  const [input, setInput] = useState('');
  const [typing, setTyping] = useState(false);
  const messagesRef = useRef(null);

  useEffect(() => {
    if (messagesRef.current) messagesRef.current.scrollTop = messagesRef.current.scrollHeight;
  }, [messages, open, typing]);

  const quickReplies = [
    'View pricing',
    'Book a journey',
    'Wedding enquiry',
    'Speak to the desk',
  ];

  const respond = (raw) => {
    const text = raw.toLowerCase();
    if (/price|cost|how much|rate|fee|package|pricing/.test(text))
      return "Our packages start at £150 per journey for Essential, £450 per day for Signature, and bespoke quotes for tailored itineraries. New clients receive 15% off the first booking — quote LT26.";
    if (/book|reserve|reservation|schedule/.test(text))
      return "Wonderful. You may use the booking widget at the top of the page, or I can pass your details to our desk. May I have a pickup location and date?";
    if (/wedding|bride|marriage/.test(text))
      return "We coordinate full wedding-day transport including the bridal car, family vehicles, and guest transfers. Champagne service is complimentary on Signature and Bespoke. Shall I arrange a callback from our wedding specialist?";
    if (/airport|flight|terminal|heathrow|gatwick|stansted|luton|city/.test(text))
      return "We service all UK airports with real-time flight monitoring, meet-and-greet, and 60 minutes of complimentary waiting time. Which airport and date are you considering?";
    if (/hour|open|when|24|night/.test(text))
      return "Our concierge desk is staffed 24 hours a day, 365 days a year. You may call us anytime on +44 20 4577 3000.";
    if (/contact|phone|email|speak|call|human|person|desk/.test(text))
      return "You may reach our desk on +44 20 4577 3000 or concierge@luxurytransport.co.uk — a member of our team responds within the hour.";
    if (/discount|offer|deal|promo|code|15/.test(text))
      return "First-time clients enjoy 15% off the opening journey. Simply quote LT26 when booking through the desk or the booking widget.";
    if (/v-?class|car|vehicle|fleet|mercedes/.test(text))
      return "Our fleet is the Mercedes V-Class, specified beyond standard — hand-stitched leather, panoramic glazed roof, champagne bar, refrigerator, and uniformed chauffeur. Capacity for up to eight guests.";
    if (/hello|^hi$|^hey$|good (morning|evening|afternoon)/.test(text))
      return "Good day. How may I assist you with your travel arrangements today?";
    if (/thank/.test(text))
      return "It is my pleasure. Is there anything further I can arrange for you?";
    return "Forgive me, I may have misunderstood. Would you like to discuss pricing, book a journey, or speak with our desk directly?";
  };

  const send = (text) => {
    if (!text || !text.trim()) return;
    setMessages(m => [...m, { from: 'user', text: text.trim() }]);
    setInput('');
    setTyping(true);
    setTimeout(() => {
      setTyping(false);
      setMessages(m => [...m, { from: 'bot', text: respond(text) }]);
    }, 700);
  };

  return (
    <>
      {/* Floating launch button */}
      <button
        onClick={() => setOpen(o => !o)}
        aria-label={open ? 'Close concierge chat' : 'Open concierge chat'}
        className={`fixed bottom-6 right-6 z-50 w-16 h-16 rounded-full bg-gradient-to-b from-gold to-gold-deep text-ivory shadow-[0_15px_45px_rgba(232,194,117,0.55)] flex items-center justify-center transition-all duration-300 hover:scale-105 hover:shadow-[0_20px_55px_rgba(232,194,117,0.75)] ring-2 ring-gold-light/30 ${open ? 'rotate-90' : ''}`}
      >
        {open ? <CloseIcon className="w-6 h-6"/> : <ChatBubbleIcon className="w-7 h-7"/>}
        {!open && messages.length === 1 && (
          <span className="absolute -top-1 -right-1 w-5 h-5 rounded-full bg-ink text-gold text-[10px] font-semibold flex items-center justify-center border border-gold/60 animate-pulse">1</span>
        )}
      </button>

      {/* Chat window */}
      <div
        className={`fixed bottom-24 right-6 z-50 w-[360px] max-w-[calc(100vw-3rem)] h-[540px] max-h-[calc(100vh-8rem)] bg-ink rounded-2xl shadow-[0_30px_80px_rgba(0,0,0,0.30)] border border-black/10 flex flex-col overflow-hidden origin-bottom-right transition-all duration-300 ${
          open ? 'opacity-100 scale-100 pointer-events-auto translate-y-0' : 'opacity-0 scale-90 pointer-events-none translate-y-4'
        }`}
      >
        {/* Header */}
        <div className="bg-gradient-to-br from-ink-soft to-ink border-b border-gold/30 px-5 py-4 flex items-center gap-3">
          <div className="w-11 h-11 rounded-full bg-gradient-to-br from-gold to-gold-deep border border-gold-light/40 flex items-center justify-center text-ivory font-serif text-sm tracking-wider shadow">
            LT
          </div>
          <div className="flex-1 min-w-0">
            <div className="font-serif text-base text-ivory leading-tight">Adelaide</div>
            <div className="text-[10px] tracking-[0.18em] uppercase text-gold flex items-center gap-1.5 mt-0.5">
              <span className="w-1.5 h-1.5 bg-gold rounded-full animate-pulse"></span>
              Booking Concierge · Online
            </div>
          </div>
          <button onClick={() => setOpen(false)} aria-label="Close chat" className="text-ivory/60 hover:text-gold transition-colors p-1">
            <CloseIcon className="w-4 h-4"/>
          </button>
        </div>

        {/* Messages */}
        <div ref={messagesRef} className="flex-1 overflow-y-auto px-5 py-4 space-y-3 bg-ink-soft/40">
          {messages.map((m, i) => (
            <div key={i} className={`flex ${m.from === 'user' ? 'justify-end' : 'justify-start'}`}>
              <div className={`max-w-[82%] px-4 py-2.5 text-[13px] leading-relaxed rounded-2xl ${
                m.from === 'user'
                  ? 'bg-gradient-to-b from-gold to-gold-deep text-ivory rounded-br-sm shadow'
                  : 'bg-ink border border-black/10 text-ivory rounded-bl-sm'
              }`}>
                {m.text}
              </div>
            </div>
          ))}
          {typing && (
            <div className="flex justify-start">
              <div className="bg-ink border border-black/10 px-4 py-3 rounded-2xl rounded-bl-sm flex gap-1">
                <span className="w-1.5 h-1.5 bg-gold rounded-full animate-bounce" style={{animationDelay: '0ms'}}></span>
                <span className="w-1.5 h-1.5 bg-gold rounded-full animate-bounce" style={{animationDelay: '150ms'}}></span>
                <span className="w-1.5 h-1.5 bg-gold rounded-full animate-bounce" style={{animationDelay: '300ms'}}></span>
              </div>
            </div>
          )}
        </div>

        {/* Quick replies (only on first turn) */}
        {messages.length <= 1 && (
          <div className="px-4 py-3 border-t border-black/5 flex flex-wrap gap-1.5 bg-ink">
            {quickReplies.map(q => (
              <button
                key={q}
                onClick={() => send(q)}
                className="px-3 py-1.5 text-[11px] tracking-wide rounded-full border border-gold/40 text-gold hover:bg-gold hover:text-ivory transition-all duration-300"
              >
                {q}
              </button>
            ))}
          </div>
        )}

        {/* Input */}
        <form
          onSubmit={(e) => { e.preventDefault(); send(input); }}
          className="border-t border-black/10 px-3 py-3 flex items-center gap-2 bg-ink"
        >
          <input
            type="text"
            value={input}
            onChange={(e) => setInput(e.target.value)}
            placeholder="Type your message..."
            className="flex-1 py-2 px-3 text-[13px] bg-black/5 border border-black/10 rounded-full focus:outline-none focus:border-gold focus:bg-black/10 text-ivory placeholder:text-ivory/40 transition-colors"
          />
          <button
            type="submit"
            aria-label="Send message"
            disabled={!input.trim()}
            className="w-9 h-9 rounded-full bg-gradient-to-b from-gold to-gold-deep text-ivory flex items-center justify-center hover:from-gold-light disabled:opacity-40 disabled:cursor-not-allowed transition-all duration-300 flex-shrink-0"
          >
            <SendIcon className="w-4 h-4"/>
          </button>
        </form>
      </div>
    </>
  );
};
