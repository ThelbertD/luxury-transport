/* ============ REVEAL ON SCROLL HOOK ============ */
const useReveal = () => {
  useEffect(() => {
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('in');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -60px 0px' });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
};

const Hero = () => {
  const videoRef = useRef(null);
  const [tab, setTab] = useState('oneway');
  const [showReturn, setShowReturn] = useState(false);
  const [duration, setDuration] = useState('4h');
  const today = new Date().toISOString().split('T')[0];
  const todayAt1530 = `${today}T15:30`;

  useEffect(() => {
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    let target = 0, current = 0, raf;
    let triggered = false;

    const tick = () => {
      current += (target - current) * 0.12;
      const v = videoRef.current;
      if (v) {
        v.style.transform = `translate3d(0, ${current.toFixed(2)}px, 0) scale(1.18)`;
      }
      raf = requestAnimationFrame(tick);
    };
    if (!reduced) raf = requestAnimationFrame(tick);

    const onScroll = () => {
      // Trigger the video on the first scroll down past 20px
      if (!triggered && window.scrollY > 20) {
        triggered = true;
        const v = videoRef.current;
        if (v) {
          const p = v.play();
          if (p && typeof p.catch === 'function') p.catch(() => {});
        }
      }
      if (!reduced) target = window.scrollY * 0.40;
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener('scroll', onScroll);
    };
  }, []);

  return (
  <section id="top" className="relative min-h-screen flex items-center justify-center overflow-hidden bg-ink">
    {/* Background video — paused until first scroll, then plays + drifts on scroll */}

      muted
      loop
      playsInline
      preload="auto"
      aria-hidden="true"

      <source src="hero.mp4" type="video/mp4" />
    </video>

    {/* Layered overlay for legibility */}
    <div className="hero-video-overlay"></div>

    {/* Decorative gold ring (subtle, layered above overlay) */}

    <div className="absolute -top-20 -right-20 w-[400px] h-[400px] rounded-full border border-gold/10 pointer-events-none z-[2]"></div>

    {/* Content */}
    <div className="relative z-10 max-w-7xl mx-auto px-6 lg:px-10 pt-32 pb-24 w-full grid lg:grid-cols-12 gap-12 lg:gap-16 items-center">
      {/* Left column: text */}
      <div className="lg:col-span-7 text-center lg:text-left order-2 lg:order-1">
        <p className="reveal text-[11px] font-medium tracking-[0.32em] uppercase text-gold mb-8">
          <span className="inline-block w-10 h-px bg-gold align-middle mr-4"></span>
          London &middot; Est. 2026
        </p>
